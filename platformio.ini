[platformio]
default_envs = ulanzi-tc001-8mb-ota

[env:ulanzi-tc001-4mb]
platform  = espressif32
board     = esp32dev
framework = arduino

; 4 MB flash, min_spiffs gives ~1.9 MB app + 1.5 MB LittleFS
board_build.flash_size        = 4MB
board_build.partitions        = min_spiffs.csv
board_build.filesystem        = littlefs

; Build flags — keep Arduino defines
build_flags =
    -DCORE_DEBUG_LEVEL=0
    -DBOARD_HAS_PSRAM=0

; Upload & monitor
upload_speed   = 921600
monitor_speed  = 115200
monitor_filters = esp32_exception_decoder, default

; External libraries (pinned to known-good versions)
lib_deps =
    fastled/FastLED @ ^3.7.0
    bblanchon/ArduinoJson
    knolleary/PubSubClient
    bodmer/TJpg_Decoder
    bitbank2/AnimatedGIF
    robtillaart/SHT31
; UniversalMesh is a local library in lib/UniversalMesh/ — PlatformIO picks it up automatically

[env:ulanzi-tc001-8mb]
platform  = espressif32
board     = esp32dev
framework = arduino

; 8 MB flash, default_8MB = 3MB app + 1.5MB SPIFFS (matches Arduino IDE "8M with spiffs")
board_build.flash_size        = 8MB
board_build.partitions        = default_8MB.csv
board_build.filesystem        = littlefs

; Build flags — keep Arduino defines
build_flags =
    -DCORE_DEBUG_LEVEL=0
    -DBOARD_HAS_PSRAM=0

; Upload & monitor
upload_speed   = 921600
monitor_speed  = 115200
monitor_filters = esp32_exception_decoder, default

; External libraries (pinned to known-good versions)
lib_deps =
    fastled/FastLED @ ^3.7.0
    bblanchon/ArduinoJson
    knolleary/PubSubClient
    bodmer/TJpg_Decoder
    bitbank2/AnimatedGIF
    robtillaart/SHT31
; UniversalMesh is a local library in lib/UniversalMesh/ — PlatformIO picks it up automatically


